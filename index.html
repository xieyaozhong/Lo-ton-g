<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#10263b">
<meta name="description" content="依使用者位置與偵測半徑，預估雨勢進入範圍的時間與方向。">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/rain-guard.svg" type="image/svg+xml">
<title>雨境｜定位降雨預警</title>
<style>
:root{--bg:#06111c;--card:#0d2638e8;--line:#6bd9ff26;--text:#eef9ff;--muted:#9bb2c1;--cyan:#6bd9ff;--safe:#76e3af;--warn:#ffd36b;--danger:#ff8585}*{box-sizing:border-box}html{min-height:100%;background:var(--bg)}body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 0,#407daa45,transparent 34rem),radial-gradient(circle at 100% 35%,#25539538,transparent 30rem),linear-gradient(160deg,#06101a,#0b1e2d 55%,#07131f)}button,input{font:inherit}.shell{width:min(760px,100%);margin:auto;padding:max(24px,env(safe-area-inset-top)) 18px max(32px,env(safe-area-inset-bottom))}.hero{display:flex;justify-content:space-between;gap:16px;padding:8px 4px 24px}.eyebrow{margin:0 0 8px;color:var(--cyan);letter-spacing:.18em;font-size:11px;font-weight:800}h1{margin:0;font-size:clamp(44px,10vw,70px);line-height:.95;letter-spacing:-.06em}.subtitle{margin:14px 0 0;color:var(--muted);line-height:1.65}.card{background:linear-gradient(145deg,#143046e8,#0a1c2ce0);border:1px solid var(--line);border-radius:26px;box-shadow:0 22px 70px #00000055;margin-bottom:16px;padding:22px}.topline,.row{display:flex;align-items:center;justify-content:space-between;gap:14px}.topline{justify-content:flex-start;color:var(--muted);font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#8092a0;box-shadow:0 0 0 5px #8092a01f}.dot.safe{background:var(--safe)}.dot.warn{background:var(--warn)}.dot.danger{background:var(--danger)}.headline{margin-top:20px;font-size:clamp(30px,8vw,48px);font-weight:850;letter-spacing:-.045em;line-height:1.08}.sub{margin-top:10px;color:var(--muted);line-height:1.7;min-height:28px}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:22px}.metric{padding:14px;border-radius:17px;background:#020d1647;border:1px solid #ffffff0e}.metric span{display:block;color:var(--muted);font-size:12px;margin-bottom:7px}.metric strong{font-size:17px}h2{margin:0;font-size:19px}.row p{margin:7px 0 0;color:var(--muted);font-size:13px}.badge{background:#6bd9ff1c;border:1px solid #6bd9ff3b;color:#c8f1ff;padding:7px 10px;border-radius:999px;font-size:12px;white-space:nowrap}.radar{width:min(330px,85vw);aspect-ratio:1;margin:24px auto 15px;position:relative;border-radius:50%;overflow:hidden;background:radial-gradient(circle,#4c9ec91a,#020e176b 64%,#00080eb8);border:1px solid #6bd9ff24}.radar:before,.radar:after{content:"";position:absolute;background:#6bd9ff1a}.radar:before{width:1px;top:8%;bottom:8%;left:50%}.radar:after{height:1px;left:8%;right:8%;top:50%}.ring{position:absolute;border:1px solid #6bd9ff1f;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}.r1{width:34%;height:34%}.r2{width:66%;height:66%}.r3{width:94%;height:94%}.sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0 300deg,#6bd9ff21 345deg,#6bd9ff52);animation:scan 5s linear infinite}@keyframes scan{to{transform:rotate(360deg)}}.center{position:absolute;width:14px;height:14px;left:50%;top:50%;transform:translate(-50%,-50%);background:white;border:4px solid #6bd9ff8c;border-radius:50%;box-shadow:0 0 24px #6bd9ffb3;z-index:3}.compass{position:absolute;color:#dcf3ff91;font-size:11px;z-index:3}.n{top:5%;left:50%;transform:translateX(-50%)}.s{bottom:5%;left:50%;transform:translateX(-50%)}.e{right:5%;top:50%;transform:translateY(-50%)}.w{left:5%;top:50%;transform:translateY(-50%)}.sample{position:absolute;width:12px;height:12px;margin:-6px;border-radius:50%;background:#547084;border:2px solid #ffffff99;z-index:4}.sample.wet{background:var(--warn);box-shadow:0 0 14px #ffd36bcc;transform:scale(1.35)}.sample.urgent{background:var(--danger);box-shadow:0 0 16px #ff8585e6;transform:scale(1.5)}.fine,footer{color:#8299a8;font-size:11px;line-height:1.6}.timeline{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(54px,1fr);gap:8px;overflow-x:auto;padding:17px 1px 6px}.slot{min-height:112px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:7px;padding:10px 5px;border-radius:15px;background:#030f1842;border:1px solid #ffffff0a}.barwrap{height:55px;display:flex;align-items:flex-end}.bar{width:11px;min-height:2px;border-radius:8px 8px 3px 3px;background:linear-gradient(#8fe7ff,#5e8cff)}.slot strong{font-size:11px}.slot span{color:var(--muted);font-size:10px}.settings label{display:block;margin-top:22px}.settings label>span{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px}.settings b{color:var(--text)}input[type=range]{width:100%;margin-top:12px;accent-color:var(--cyan)}.buttons{display:grid;grid-template-columns:1.35fr 1fr;gap:10px;margin-top:24px}button{cursor:pointer;border:0;border-radius:15px;padding:13px 16px;color:var(--text);font-weight:750}.primary{background:linear-gradient(135deg,#50c9f2,#557ff5);box-shadow:0 12px 30px #4e91e747}.secondary{background:#ffffff12;border:1px solid #ffffff17}.msg{min-height:21px;color:var(--muted);font-size:12px;line-height:1.6;margin:13px 2px 0}footer{padding:8px 4px}@media(min-width:680px){.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}}@media(max-width:420px){.buttons{grid-template-columns:1fr}.card{border-radius:22px}}@media(prefers-reduced-motion:reduce){.sweep{animation:none}}
</style>
</head>
<body>
<main class="shell">
<header class="hero"><div><p class="eyebrow">LOCATION RAIN GUARD</p><h1>雨境</h1><p class="subtitle">以你的位置為中心，預估雨勢進入偵測範圍的時間。</p></div></header>
<section class="card" aria-live="polite"><div class="topline"><span id="dot" class="dot"></span><span id="updated">尚未開始偵測</span></div><div id="headline" class="headline">等待定位</div><div id="sub" class="sub">按下「開始偵測」並允許位置權限。</div><div class="metrics"><div class="metric"><span>預估抵達</span><strong id="arrival">—</strong></div><div class="metric"><span>最早方向</span><strong id="direction">—</strong></div><div class="metric"><span>預估雨量</span><strong id="rain">—</strong></div><div class="metric"><span>信心參考</span><strong id="prob">—</strong></div></div></section>
<section class="card"><div class="row"><div><h2>偵測範圍</h2><p id="position">尚未取得位置</p></div><span id="badge" class="badge">半徑 5 km</span></div><div class="radar"><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="sweep"></div><div class="center"></div><span class="compass n">北</span><span class="compass e">東</span><span class="compass s">南</span><span class="compass w">西</span><div id="samples"></div></div><p class="fine">中心與邊界八方向同步取樣；預報格點解析度不同時，鄰近點可能取得相同資料。</p></section>
<section class="card"><div class="row"><div><h2>中心點未來 3 小時</h2><p>每 15 分鐘預估降水量</p></div><button id="refresh" class="secondary" type="button">↻</button></div><div id="timeline" class="timeline">取得定位後顯示</div></section>
<section class="card settings"><h2>預警設定</h2><label><span>偵測半徑 <b id="radiusText">5 km</b></span><input id="radius" type="range" min="1" max="30" step="1" value="5"></label><label><span>視為下雨的門檻 <b id="thresholdText">0.10 mm / 15 分鐘</b></span><input id="threshold" type="range" min="0.05" max="2" step="0.05" value="0.10"></label><label><span>提前通知時間 <b id="leadText">60 分鐘</b></span><input id="lead" type="range" min="15" max="180" step="15" value="60"></label><div class="buttons"><button id="start" class="primary" type="button">開始偵測</button><button id="notify" class="secondary" type="button">開啟通知</button></div><p id="msg" class="msg"></p></section>
<footer>預報來源：Open-Meteo。預警屬模式推估，局部對流可能快速生成或消散。</footer>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id),dirs=['中心','北','東北','東','東南','南','西南','西','西北'],bearings=[null,0,45,90,135,180,225,270,315];
const state={pos:null,watch:null,timer:null,lastAlert:localStorage.rainGuardLastAlert||'',radius:+(localStorage.rainGuardRadius||5),threshold:+(localStorage.rainGuardThreshold||.1),lead:+(localStorage.rainGuardLead||60)};
const clock=t=>new Intl.DateTimeFormat('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false}).format(new Date(t*1000));
function message(t,error=false){$('msg').textContent=t;$('msg').style.color=error?'#ffaaaa':''}
function dest(lat,lon,bearing,km){const R=6371,d=km/R,q=bearing*Math.PI/180,p=lat*Math.PI/180,l=lon*Math.PI/180,p2=Math.asin(Math.sin(p)*Math.cos(d)+Math.cos(p)*Math.sin(d)*Math.cos(q)),l2=l+Math.atan2(Math.sin(q)*Math.sin(d)*Math.cos(p),Math.cos(d)-Math.sin(p)*Math.sin(p2));return{lat:p2*180/Math.PI,lon:((l2*180/Math.PI+540)%360)-180}}
function points(){const p=[{lat:state.pos.latitude,lon:state.pos.longitude}];bearings.slice(1).forEach(b=>p.push(dest(state.pos.latitude,state.pos.longitude,b,state.radius)));return p}
function analyze(d,i){const s=d.minutely_15;if(!s?.time?.length)return{index:i,next:null,data:d};const now=Date.now()/1000-60,j=s.time.findIndex((t,k)=>t>=now&&+(s.precipitation[k]||0)>=state.threshold);if(j<0)return{index:i,next:null,data:d};const next=s.time[j],hour=d.hourly;let probability=null;if(hour?.time?.length){let best=0,diff=Infinity;hour.time.forEach((t,k)=>{const x=Math.abs(t-next);if(x<diff){diff=x;best=k}});probability=hour.precipitation_probability?.[best]??null}return{index:i,direction:dirs[i],next,minutes:Math.max(0,Math.round((next*1000-Date.now())/60000)),mm:+(s.precipitation[j]||0),probability,data:d}}
function renderDots(all,winner){const pos=[[50,50],[50,15],[75,25],[85,50],[75,75],[50,85],[25,75],[15,50],[25,25]];$('samples').innerHTML=pos.map(([x,y],i)=>`<span class="sample${all[i]?.next?' wet':''}${winner?.index===i&&winner.minutes<=state.lead?' urgent':''}" style="left:${x}%;top:${y}%" title="${all[i]?.next?dirs[i]+' '+clock(all[i].next):dirs[i]+' 無雨'}"></span>`).join('')}
function renderTimeline(d){const s=d?.minutely_15;if(!s?.time){$('timeline').textContent='暫無資料';return}const now=Date.now()/1000-60,items=s.time.map((t,i)=>({t,i})).filter(x=>x.t>=now).slice(0,12),max=Math.max(.5,...items.map(x=>+(s.precipitation[x.i]||0)));$('timeline').innerHTML=items.map(x=>{const mm=+(s.precipitation[x.i]||0),h=Math.max(2,Math.round(mm/max*52));return`<div class="slot"><div class="barwrap"><div class="bar" style="height:${h}px;opacity:${mm?1:.18}"></div></div><strong>${clock(x.t)}</strong><span>${mm.toFixed(2)} mm</span></div>`}).join('')}
async function alertRain(w){if(Notification.permission!=='granted'||w.minutes>state.lead)return;const key=w.next+'-'+w.direction;if(key===state.lastAlert)return;const title=w.minutes?'約 '+w.minutes+' 分鐘後可能下雨':'目前偵測到降雨',body=w.direction+'方向，預估 '+w.mm.toFixed(2)+' mm / 15 分鐘';const reg=await navigator.serviceWorker?.ready;if(reg)reg.showNotification(title,{body,icon:'./icons/rain-guard.svg',tag:'rain-guard'});else new Notification(title,{body});state.lastAlert=key;localStorage.rainGuardLastAlert=key}
async function forecast(){if(!state.pos)return;message('正在更新降雨預報…');try{const ps=points(),u=new URL('https://api.open-meteo.com/v1/forecast');u.searchParams.set('latitude',ps.map(p=>p.lat.toFixed(5)).join(','));u.searchParams.set('longitude',ps.map(p=>p.lon.toFixed(5)).join(','));u.searchParams.set('minutely_15','precipitation,weather_code');u.searchParams.set('hourly','precipitation_probability');u.searchParams.set('forecast_days','2');u.searchParams.set('timeformat','unixtime');u.searchParams.set('timezone','auto');const r=await fetch(u);if(!r.ok)throw Error('氣象服務回應 '+r.status);const raw=await r.json(),sets=Array.isArray(raw)?raw:[raw],all=sets.map(analyze),rainy=all.filter(x=>x.next).sort((a,b)=>a.next-b.next),w=rainy[0];renderDots(all,w);renderTimeline(all[0]?.data);$('updated').textContent='更新於 '+new Date().toLocaleTimeString('zh-TW',{hour12:false});if(!w){$('dot').className='dot safe';$('headline').textContent='目前範圍內無明顯降雨';$('sub').textContent='目前預報時段尚未達到設定門檻。';$('arrival').textContent=$('direction').textContent=$('rain').textContent=$('prob').textContent='—'}else{$('dot').className='dot '+(w.minutes<=state.lead?'danger':'warn');$('headline').textContent=w.minutes<=0?'目前可能正在下雨':`約 ${w.minutes} 分鐘後可能下雨`;$('sub').textContent=`雨勢最早由${w.direction}方向進入 ${state.radius} 公里範圍。`;$('arrival').textContent=clock(w.next);$('direction').textContent=w.direction;$('rain').textContent=w.mm.toFixed(2)+' mm';$('prob').textContent=w.probability==null?'模式雨量':w.probability+'%';await alertRain(w)}message('偵測完成；每 5 分鐘自動更新。')}catch(e){$('dot').className='dot danger';$('headline').textContent='預報取得失敗';$('sub').textContent='請檢查網路後再試一次。';message(e.message||'未知錯誤',true)}}
function got(p){const old=state.pos;state.pos={latitude:p.coords.latitude,longitude:p.coords.longitude};$('position').textContent=`${state.pos.latitude.toFixed(4)}, ${state.pos.longitude.toFixed(4)}（精度約 ${Math.round(p.coords.accuracy)} m）`;if(!old||Math.hypot(old.latitude-state.pos.latitude,old.longitude-state.pos.longitude)>.0045)forecast()}
function positionError(e){const m={1:'位置權限被拒絕，請到瀏覽器設定允許定位。',2:'目前無法判定位置，請確認定位服務已開啟。',3:'取得位置逾時，請再試一次。'};message(m[e.code]||'取得位置失敗。',true);$('headline').textContent='無法取得位置'}
function start(){if(!navigator.geolocation)return positionError({code:2});message('正在取得位置…');if(state.watch!==null)navigator.geolocation.clearWatch(state.watch);state.watch=navigator.geolocation.watchPosition(got,positionError,{enableHighAccuracy:true,maximumAge:60000,timeout:15000});clearInterval(state.timer);state.timer=setInterval(forecast,300000);$('start').textContent='偵測中'}
function sync(){$('radius').value=state.radius;$('threshold').value=state.threshold;$('lead').value=state.lead;$('radiusText').textContent=state.radius+' km';$('badge').textContent='半徑 '+state.radius+' km';$('thresholdText').textContent=state.threshold.toFixed(2)+' mm / 15 分鐘';$('leadText').textContent=state.lead+' 分鐘'}
[['radius','radius','rainGuardRadius'],['threshold','threshold','rainGuardThreshold'],['lead','lead','rainGuardLead']].forEach(([id,key,store])=>{$(id).addEventListener('input',e=>{state[key]=+e.target.value;localStorage[store]=state[key];sync()});$(id).addEventListener('change',()=>state.pos&&forecast())});
$('start').onclick=start;$('refresh').onclick=forecast;$('notify').onclick=async()=>{if(!('Notification'in window))return message('此瀏覽器不支援通知。',true);const p=await Notification.requestPermission();if(p==='granted'){$('notify').textContent='通知已開啟';message('通知權限已開啟。')}else message('通知權限未開啟。',true)};sync();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(console.warn);if('Notification'in window&&Notification.permission==='granted')$('notify').textContent='通知已開啟';
</script>
</body>
</html>
